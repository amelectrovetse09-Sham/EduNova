<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1565C0,#42A5F5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:360px;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
font-size:34px;
font-weight:bold;
color:#1565C0;
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:#1565C0;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.signup{
text-align:center;
margin-top:15px;
}

.signup a{
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="logo">🎓 EduNova</div>

<p>Login to Your Account</p>

<input type="email" id="loginEmail" placeholder="Email Address" required>

<input type="password" id="loginPassword" placeholder="Password" required>

<button onclick="alert(typeof login); login();">Login</button>

<div class="signup">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>

<script type="module" src="firebase.js"></script>

</body>
</html>

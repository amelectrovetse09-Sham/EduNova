<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#1565C0,#42A5F5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
width:350px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.logo{
text-align:center;
font-size:32px;
font-weight:bold;
color:#1565C0;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.link{
text-align:center;
margin-top:20px;
}

.link a{
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">🎓 EduNova</div>

<div class="subtitle">
Learn Today, Lead Tomorrow
</div>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<div class="link">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>

<script>
function login(){

alert("Welcome to EduNova!");

window.location.href="index.html";

}
</script>

</body>
</html>

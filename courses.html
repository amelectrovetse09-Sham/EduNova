<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova Courses</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f5f7fb;
font-family:Arial,sans-serif;
margin:0;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

#courseContainer{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.course{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.course img{
width:100%;
height:180px;
object-fit:cover;
}

.course-content{
padding:15px;
}

.course h2{
color:#1565C0;
margin-bottom:10px;
}

.course p{
margin:5px 0;
}

button{
width:100%;
padding:12px;
background:#1565C0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
📚 EduNova Courses
</header>

<div id="courseContainer">

Loading Courses...

</div>

<script type="module" src="courses.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#1565C0;
color:#fff;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.profile{
background:#fff;
margin:20px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.profile img{
width:100px;
height:100px;
border-radius:50%;
margin-bottom:10px;
}

.profile h2{
color:#1565C0;
margin-bottom:10px;
}

.profile p{
margin:6px 0;
color:#555;
font-size:16px;
}

.logout{
margin-top:15px;
padding:12px 25px;
background:#e53935;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
padding-bottom:90px;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:10px;
color:#1565C0;
}

footer{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -3px 10px rgba(0,0,0,.1);
}

footer a{
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>

</head>

<body>

<header>
🎓 EduNova Dashboard
</header>

<div class="profile">

<img src="https://via.placeholder.com/100" alt="Profile">

<h2 id="userName">Loading...</h2>

<p id="userEmail">Loading...</p>

<p id="userMobile">Loading...</p>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

<div class="grid">

<div class="card" onclick="location.href='courses.html'">
📚
<h3>My Courses</h3>
</div>

<div class="card" onclick="location.href='live.html'">
🎥
<h3>Live Classes</h3>
</div>

<div class="card" onclick="location.href='tests.html'">
📝
<h3>Online Tests</h3>
</div>

<div class="card" onclick="location.href='notes.html'">
📄
<h3>Notes</h3>
</div>

<div class="card" onclick="location.href='result.html'">
📊
<h3>Progress</h3>
</div>

<div class="card" onclick="location.href='profile.html'">
👤
<h3>Profile</h3>
</div>

</div>

<footer>

<a href="index.html">Home</a>

<a href="courses.html">Courses</a>

<a href="tests.html">Tests</a>

<a href="profile.html">Profile</a>

</footer>

<script type="module" src="dashboard.js"></script>

</body>
</html>

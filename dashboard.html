<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#1565C0;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.profile{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-top:10px;
color:#1565C0;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -3px 10px rgba(0,0,0,.1);
}

footer a{
text-decoration:none;
color:#1565C0;
font-weight:bold;
}
</style>

</head>

<body>

<header>
🎓 EduNova Dashboard
</header>

<div class="profile">

<img src="https://via.placeholder.com/90" alt="Profile">

<h2>Welcome Student</h2>

<p>Keep Learning Every Day 🚀</p>

</div>

<div class="grid">

<div class="card">
📚
<h3>My Courses</h3>
</div>

<div class="card">
🎥
<h3>Live Classes</h3>
</div>

<div class="card">
📝
<h3>Online Tests</h3>
</div>

<div class="card">
📄
<h3>Notes</h3>
</div>

<div class="card">
📊
<h3>Progress</h3>
</div>

<div class="card">
👤
<h3>Profile</h3>
</div>

</div>

<footer>

<a href="index.html">Home</a>

<a href="courses.html">Courses</a>

<a href="tests.html">Tests</a>

<a href="profile.html">Profile</a>

</footer>

</body>
</html>

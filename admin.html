<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova Admin Panel</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6f9;
}

header{
background:#1565C0;
color:#fff;
padding:15px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
max-width:700px;
margin:25px auto;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#1565C0;
color:#fff;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0d47a1;
}
</style>
</head>

<body>

<header>👨‍💼 EduNova Admin Panel</header>

<div class="container">

<div class="card">
<h2>📚 नया Course जोड़ें</h2>

<input type="text" placeholder="Course Name">

<textarea placeholder="Course Description"></textarea>

<button>Course Save</button>
</div>

<div class="card">
<h2>📄 नया Notes जोड़ें</h2>

<input type="text" placeholder="Notes Title">

<input type="text" placeholder="PDF Link">

<button>Notes Save</button>
</div>

<div class="card">
<h2>📝 नया Test जोड़ें</h2>

<input type="text" placeholder="Test Name">

<input type="number" placeholder="Total Questions">

<button>Create Test</button>

</div>

</div>

</body>
</html>
